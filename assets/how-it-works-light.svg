<polyline class="edge" data-from="G" data-to="H" data-style="solid" data-arrow-start="false" data-arrow-end="true" points="224.56049999999996,735.7 224.56049999999996,862 230.85899999999998,862 230.85899999999998,924" fill="none" stroke="var(--_line)" stroke-width="1" marker-end="url(#arrowhead)" />
