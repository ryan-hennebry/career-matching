  <text x="165.78024999999997" y="1171.4" text-anchor="middle" font-size="13" font-weight="500" fill="var(--_text)"><tspan x="165.78024999999997" dy="-3.9000000000000012">Future runs become</tspan><tspan x="165.78024999999997" dy="16.900000000000002">more tailored over time</tspan></text>
