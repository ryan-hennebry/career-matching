<polyline class="edge" data-from="E" data-to="F" data-style="solid" data-arrow-start="false" data-arrow-end="true" points="199.32441666666665,498.3 199.32441666666665,510.3 224.56049999999996,510.3 224.56049999999996,546.3" fill="none" stroke="var(--_line)" stroke-width="1" marker-end="url(#arrowhead)" />
<polyline class="edge" data-from="F" data-to="G" data-style="solid" data-arrow-start="false" data-arrow-end="true" points="224.56049999999996,617 224.56049999999996,665" fill="none" stroke="var(--_line)" stroke-width="1" marker-end="url(#arrowhead)" />
