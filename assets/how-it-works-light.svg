  <rect x="49.14774999999998" y="400.5" width="297.97324999999995" height="28" rx="0" ry="0" fill="var(--_group-hdr)" stroke="var(--_node-stroke)" stroke-width="1" />
  <text x="61.14774999999998" y="414.5" font-size="12" font-weight="600" fill="var(--_text-sec)" dy="4.199999999999999">2) Career matching runs</text>
</g>
