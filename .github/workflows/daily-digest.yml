name: Daily Job Search Digest

on:
  schedule:
    - cron: '0 6 * * 1-5'  # 06:00 UTC = 7am BST. During GMT (winter) this runs at 6am local.
  workflow_dispatch: {}

concurrency:
  group: jsa-daily-digest
  cancel-in-progress: false  # Manual workflow_dispatch during scheduled run will queue (not cancel).

permissions:
  contents: write

jobs:
  daily-digest:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        working-directory: .
        run: |
          pip install python-jobspy resend playwright
          python -m playwright install chromium
      - name: Install Claude Code
        working-directory: .
        run: |
          npm install -g @anthropic-ai/claude-code
          claude --version
      - name: Load config
        id: config
        working-directory: .
        run: |
          config=$(cat .github/jsa-config.json)
          echo "config<<CONFIGEOF" >> "$GITHUB_OUTPUT"
          echo "$config" >> "$GITHUB_OUTPUT"
          echo "CONFIGEOF" >> "$GITHUB_OUTPUT"
      - name: Create settings.local.json
        working-directory: .
        run: |
          mkdir -p .claude
          cat > .claude/settings.local.json << 'SETTINGS_EOF'
          {
            "permissions": {
              "allow": [
                "Bash(python3:*)",
                "Bash(bash:*)",
                "Bash(git pull:*)",
                "Bash(git add:*)",
                "Bash(git commit:*)",
                "Bash(git push:*)",
                "Bash(find:*)",
                "Bash(test:*)",
                "WebFetch(domain:web3.career)",
                "WebFetch(domain:www.remote3.co)",
                "WebFetch(domain:beincrypto.com)",
                "WebFetch(domain:cryptocurrencyjobs.co)",
                "WebFetch(domain:laborx.com)",
                "WebFetch(domain:aijobs.app)",
                "WebFetch(domain:aijobs.ai)",
                "WebFetch(domain:theaijobboard.com)",
                "WebFetch(domain:workinstartups.com)",
                "WebFetch(domain:www.ukstartupjobs.com)",
                "WebFetch(domain:www.jumpstart-uk.com)",
                "WebFetch(domain:www.ycombinator.com)",
                "WebFetch(domain:jobs.techstars.com)",
                "WebFetch(domain:builtinlondon.uk)",
                "WebFetch(domain:www.escapethecity.org)",
                "WebSearch",
                "Read",
                "Write",
                "Glob",
                "Grep"
              ]
            }
          }
          SETTINGS_EOF
      - name: Validate settings.local.json
        working-directory: .
        run: |
          python3 -c "import json; json.load(open('.claude/settings.local.json'))" || { echo "FAIL: invalid settings.local.json"; exit 1; }
          echo "settings.local.json is valid JSON"
      - name: Preflight checks
        working-directory: .
        run: bash scripts/preflight.sh
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      - name: Run scheduled digest
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          SCHEDULED_RUN: 'true'
          JSA_CONFIG: ${{ steps.config.outputs.config }}
        working-directory: .
        run: |
          claude --model claude-opus-4-6 --print "Run scheduled daily digest. SCHEDULED_RUN=true. Config: $JSA_CONFIG"
      - name: Commit state
        working-directory: .
        run: |
          git config user.name "Job Search Agent"
          git config user.email "agent@autonomous.bot"
          git add state.json output/session-state.md
          STAGED=$(git diff --staged --name-only)
          for f in $STAGED; do
            case "$f" in
              state.json|output/session-state.md) ;;
              *) echo "ERROR: unexpected staged file: $f" && exit 1 ;;
            esac
          done
          git diff --staged --quiet || git commit -m "chore(jsa): daily digest $(date +%Y-%m-%d)"
          git push origin main
      - name: Post-deploy smoke test
        if: success()
        run: |
          echo "Running smoke test..."
          curl -sf "${VERCEL_URL:-https://jsa-dashboard.vercel.app}/api/jobs" || exit 1
          echo "Smoke test passed."
        env:
          VERCEL_URL: ${{ vars.VERCEL_URL }}
